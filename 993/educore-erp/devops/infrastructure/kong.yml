_format_version: "3.0"


services:
  - name: api-gateway-bff
    url: http://api-gateway:4000
    routes:
      - name: auth-routes
        paths:
          - /api/auth
      - name: student-routes
        paths:
          - /api/students
      - name: dashboard-routes
        paths:
          - /api/dashboard
      - name: attendance-routes
        paths:
          - /api/attendance
      - name: fees-routes
        paths:
          - /api/fees
      - name: library-routes
        paths:
          - /api/library
      - name: staff-routes
        paths:
          - /api/staff
      - name: info-route
        paths:
          - /api/info
      - name: health-route
        paths:
          - /health
  - name: core-erp-service
    url: http://core-erp:4001
    routes:
      - name: core-finance-routes
        paths:
          - /api/finance
  - name: platform-admin-service
    url: http://platform-admin:4002
    routes:
      - name: platform-routes
        paths:
          - /api/platform
  - name: academic-service
    url: http://academic-service:4003
    routes:
      - name: academic-routes
        paths:
          - /api/academic
  - name: hr-service
    url: http://hr-service:4004
    routes:
      - name: hr-routes
        paths:
          - /api/hr
  - name: transport-service
    url: http://transport-service:4005
    routes:
      - name: transport-routes
        paths:
          - /api/transport
  - name: library-service
    url: http://library-service:4006
    routes:
      - name: library-routes
        paths:
          - /api/library
  - name: hostel-service
    url: http://hostel-service:4007
    routes:
      - name: hostel-routes
        paths:
          - /api/hostel
  - name: notification-service
    url: http://notification-service:4008
    routes:
      - name: notification-routes
        paths:
          - /api/notifications
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://localhost:3001
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600
